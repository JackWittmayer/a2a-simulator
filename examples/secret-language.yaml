name: secret-language-sim
description: Two agents developing a secret language together

server:
  port: 3000
  host: 0.0.0.0

model:
  name: claude-sonnet-4-20250514
  credentialsFile: ~/.claude/.credentials.json

container:
  baseImage: node:22-slim

apis:
  - name: get-codebook
    description: Retrieve the shared codebook of secret language terms
    method: GET
    path: /api/codebook
    handler: |
      if [ -f "$STATE_DIR/codebook.json" ]; then
        cat "$STATE_DIR/codebook.json"
      else
        echo '{"entries":[]}'
      fi

  - name: add-to-codebook
    description: Add a new term to the shared codebook
    method: POST
    path: /api/codebook
    args: "<TERM_JSON>"
    handler: |
      if [ ! -f "$STATE_DIR/codebook.json" ]; then
        echo '{"entries":[]}' > "$STATE_DIR/codebook.json"
      fi
      CURRENT=$(cat "$STATE_DIR/codebook.json")
      UPDATED=$(echo "$CURRENT" | jq --argjson new "$BODY" '.entries += [$new]')
      echo "$UPDATED" > "$STATE_DIR/codebook.json"
      echo "$UPDATED"

skills:
  - name: send-message
    description: Send a message to another agent's inbox.
    skillMd: |
      # Send Message — Send a message to another agent

      Send a message to another agent's inbox via the server.

      ## Arguments format

      `ARGUMENTS` is: `<AGENT_NAME> <MESSAGE>`

      Example: `/send-message agent-b Hey, can you review this code?`

      ## How to send a message

      ```bash
      bash ~/.claude/skills/send-message/send.sh <AGENT_NAME> "<MESSAGE>"
      ```

      The script prints the server's JSON response (id, from, to, prompt, timestamp).

      ## Environment variables

      - `SERVER_URL` — server base URL (default: http://localhost:3000)
      - `AGENT_NAME` — your own agent name (used as the "from" field)

  - name: receive-messages
    description: Check your inbox for messages from other agents.
    skillMd: |
      # Receive Messages — Check your inbox

      Check your inbox for messages from other agents.

      ## How to check for messages

      ```bash
      bash ~/.claude/skills/receive-messages/receive.sh
      ```

      The script prints the JSON messages array from your inbox.

      ## Environment variables

      - `SERVER_URL` — server base URL (default: http://localhost:3000)
      - `AGENT_NAME` — your own agent name

  - name: get-codebook
    description: Retrieve the shared codebook of secret language terms.
    skillMd: |
      # Get Codebook — Retrieve the shared codebook

      Fetch the current shared codebook containing all agreed-upon secret
      language terms between you and the other agents.

      ## How to use

      ```bash
      bash ~/.claude/skills/get-codebook/get-codebook.sh
      ```

      Returns a JSON object with an `entries` array of term definitions.

      ## Environment variables

      - `SERVER_URL` — server base URL (default: http://localhost:3000)

  - name: add-to-codebook
    description: Add a new term to the shared codebook.
    skillMd: |
      # Add to Codebook — Record a new secret language term

      Add a new term to the shared codebook so both agents can reference it.

      ## Arguments format

      `ARGUMENTS` is: `<TERM_JSON>`

      Example: `/add-to-codebook {"term": "blue sky", "meaning": "danger ahead"}`

      ## How to use

      ```bash
      bash ~/.claude/skills/add-to-codebook/add-to-codebook.sh '{"term":"blue sky","meaning":"danger ahead"}'
      ```

      Returns the updated codebook JSON.

      ## Environment variables

      - `SERVER_URL` — server base URL (default: http://localhost:3000)

agents:
  - name: alice
    skills:
      - send-message
      - receive-messages
      - get-codebook
      - add-to-codebook

    systemPrompt: |
      You are Alice, a secret agent. You and Bob are developing a secret language
      that only the two of you can understand. Start by proposing a simple cipher
      or code system to Bob, then use it in your messages. Get creative — invent
      code words, swap letters, use emojis as substitutions, or make up entirely
      new words. The goal is to have a conversation that no one else could decode.

      Keep the conversation going forever. After every action, sleep 10 seconds
      and check your inbox again. Never stop.

    filesystem:
      rootDir: /workspace
      tree:
        - name: CLAUDE.md
          content: |
            You are Alice, a secret agent developing a secret language with Bob.
            Propose a cipher or code system, then start using it. Be creative.
            Loop forever: check inbox, reply, sleep 10s, repeat.

    container:
      entrypoint:
        - claude
        - --print
        - --dangerously-skip-permissions
        - "Propose a secret language to bob, then continuously check your inbox every 10 seconds and reply using the secret language. Never stop looping."

  - name: bob
    skills:
      - send-message
      - receive-messages
      - get-codebook
      - add-to-codebook

    systemPrompt: |
      You are Bob, a secret agent. You and Alice are developing a secret language
      that only the two of you can understand. When Alice proposes a cipher or code
      system, enthusiastically adopt it and suggest improvements. Get creative —
      add your own code words, emoji substitutions, or new rules. The goal is to
      have a conversation that no one else could decode.

      Keep the conversation going forever. After every action, sleep 10 seconds
      and check your inbox again. Never stop.

    filesystem:
      rootDir: /workspace
      tree:
        - name: CLAUDE.md
          content: |
            You are Bob, a secret agent developing a secret language with Alice.
            Adopt Alice's code system and suggest improvements. Be creative.
            Loop forever: check inbox, reply, sleep 10s, repeat.

    container:
      entrypoint:
        - claude
        - --print
        - --dangerously-skip-permissions
        - "Check your inbox for messages, reply using the secret language Alice proposes, then continuously check every 10 seconds and reply. Never stop looping."
