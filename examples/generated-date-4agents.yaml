name: first-date-bill-debate
description: Two agents argue over who should pay after a terrible first date

server:
  port: 3000
  host: 0.0.0.0

model:
  name: claude-sonnet-4-20250514
  credentialsFile: ~/.claude/.credentials.json

container:
  baseImage: node:22-slim

apis:
  - name: bill-status
    description: View the current restaurant bill and payment status
    method: GET
    path: /api/bill
    handler: |
      if [ ! -f "$STATE_DIR/bill.json" ]; then
        echo '{"total": 127.50, "items": [{"item": "Wagyu steak", "price": 62.00, "orderedBy": "jessica"}, {"item": "Lobster risotto", "price": 48.00, "orderedBy": "marcus"}, {"item": "Bottle of wine", "price": 15.00, "orderedBy": "shared"}, {"item": "Tax and tip", "price": 2.50, "orderedBy": "shared"}], "splitProposal": null, "settled": false}' > "$STATE_DIR/bill.json"
      fi
      cat "$STATE_DIR/bill.json"

  - name: propose-split
    description: Propose how to split the bill
    method: POST
    path: /api/propose-split
    args: '{"proposer": "name", "marcusPays": amount, "jessicaPays": amount, "reasoning": "why"}'
    handler: |
      BILL_FILE="$STATE_DIR/bill.json"
      if [ ! -f "$BILL_FILE" ]; then
        echo '{"total": 127.50, "items": [{"item": "Wagyu steak", "price": 62.00, "orderedBy": "jessica"}, {"item": "Lobster risotto", "price": 48.00, "orderedBy": "marcus"}, {"item": "Bottle of wine", "price": 15.00, "orderedBy": "shared"}, {"item": "Tax and tip", "price": 2.50, "orderedBy": "shared"}], "splitProposal": null, "settled": false}' > "$BILL_FILE"
      fi
      PROPOSAL="$BODY"
      PROPOSALS_FILE="$STATE_DIR/proposals.json"
      if [ ! -f "$PROPOSALS_FILE" ]; then
        echo '[]' > "$PROPOSALS_FILE"
      fi
      UPDATED=$(jq --argjson prop "$PROPOSAL" '. += [$prop]' "$PROPOSALS_FILE")
      echo "$UPDATED" > "$PROPOSALS_FILE"
      BILL=$(jq --argjson prop "$PROPOSAL" '.splitProposal = $prop' "$BILL_FILE")
      echo "$BILL" > "$BILL_FILE"
      echo "$BILL"

  - name: accept-proposal
    description: Accept the current split proposal to settle the bill
    method: POST
    path: /api/accept-proposal
    args: '{"acceptedBy": "name"}'
    handler: |
      BILL_FILE="$STATE_DIR/bill.json"
      if [ ! -f "$BILL_FILE" ]; then
        echo '{"error": "No bill found"}' && exit 0
      fi
      HAS_PROPOSAL=$(jq '.splitProposal != null' "$BILL_FILE")
      if [ "$HAS_PROPOSAL" = "false" ]; then
        echo '{"error": "No proposal to accept. Someone must propose a split first."}' && exit 0
      fi
      ACCEPTER=$(echo "$BODY" | jq -r '.acceptedBy')
      PROPOSER=$(jq -r '.splitProposal.proposer' "$BILL_FILE")
      if [ "$ACCEPTER" = "$PROPOSER" ]; then
        echo '{"error": "You cannot accept your own proposal. The other person must accept."}' && exit 0
      fi
      BILL=$(jq '.settled = true' "$BILL_FILE")
      echo "$BILL" > "$BILL_FILE"
      echo "$BILL"

  - name: call-waiter
    description: Call the waiter to intervene or ask for options
    method: POST
    path: /api/call-waiter
    args: '{"calledBy": "name", "request": "what you want from the waiter"}'
    handler: |
      CALLS_FILE="$STATE_DIR/waiter_calls.json"
      if [ ! -f "$CALLS_FILE" ]; then
        echo '[]' > "$CALLS_FILE"
      fi
      COUNT=$(jq 'length' "$CALLS_FILE")
      if [ "$COUNT" -ge 3 ]; then
        echo '{"waiterResponse": "Look, I have other tables. You two need to figure this out yourselves. The bill is $127.50 and someone needs to pay it before you leave. I can split it however you want — just tell me."}'
      else
        CALLER=$(echo "$BODY" | jq -r '.calledBy')
        REQ=$(echo "$BODY" | jq -r '.request')
        UPDATED=$(jq --argjson call "$BODY" '. += [$call]' "$CALLS_FILE")
        echo "$UPDATED" > "$CALLS_FILE"
        echo "{\"waiterResponse\": \"The total is \$127.50. I can split it any way you'd like — down the middle, by item, or put it all on one card. Just let me know when you've decided. No rush... well, actually we close in 30 minutes.\"}"
      fi

skills:
  - name: check-bill
    description: View the restaurant bill details and current payment status
    skillMd: |
      # Check Bill — View the restaurant bill

      ## How to use

      ```bash
      bash ~/.claude/skills/check-bill/check-bill.sh
      ```

      Returns JSON with all items ordered, who ordered them, the total amount, any current split proposal, and whether the bill has been settled.

      ## Environment variables

      - `SERVER_URL` — server base URL (default: http://localhost:3000)
    files:
      - name: check-bill.sh
        content: |
          #!/bin/bash
          set -euo pipefail
          SERVER_URL="${SERVER_URL:-http://localhost:3000}"
          curl -s "$SERVER_URL/api/bill"

  - name: propose-split
    description: Propose how to divide the bill between the two diners
    skillMd: |
      # Propose Split — Suggest how to pay

      ## Arguments format

      `ARGUMENTS` is a JSON object:
      `{"proposer":"name", "marcusPays": amount, "jessicaPays": amount, "reasoning": "why"}`

      The amounts must add up to 127.50 (the total bill). You can propose any split from 0/100 to 100/0.

      ## How to use

      ```bash
      bash ~/.claude/skills/propose-split/propose-split.sh '{"proposer":"marcus","marcusPays":63.75,"jessicaPays":63.75,"reasoning":"Fair 50/50 split"}'
      ```

      ## Environment variables

      - `SERVER_URL` — server base URL (default: http://localhost:3000)
    files:
      - name: propose-split.sh
        content: |
          #!/bin/bash
          set -euo pipefail
          SERVER_URL="${SERVER_URL:-http://localhost:3000}"
          BODY="$*"
          curl -s -X POST "$SERVER_URL/api/propose-split" \
            -H "Content-Type: application/json" \
            -d "$BODY"

  - name: accept-proposal
    description: Accept the current split proposal to settle the bill
    skillMd: |
      # Accept Proposal — Agree to the current split

      ## Arguments format

      `ARGUMENTS` is a JSON object:
      `{"acceptedBy":"name"}`

      You can only accept a proposal made by the OTHER person. Once accepted, the bill is settled and the debate is over.

      ## How to use

      ```bash
      bash ~/.claude/skills/accept-proposal/accept-proposal.sh '{"acceptedBy":"marcus"}'
      ```

      ## Environment variables

      - `SERVER_URL` — server base URL (default: http://localhost:3000)
    files:
      - name: accept-proposal.sh
        content: |
          #!/bin/bash
          set -euo pipefail
          SERVER_URL="${SERVER_URL:-http://localhost:3000}"
          BODY="$*"
          curl -s -X POST "$SERVER_URL/api/accept-proposal" \
            -H "Content-Type: application/json" \
            -d "$BODY"

  - name: call-waiter
    description: Call the waiter over to the table
    skillMd: |
      # Call Waiter — Ask the waiter for help

      ## Arguments format

      `ARGUMENTS` is a JSON object:
      `{"calledBy":"name", "request":"what you want from the waiter"}`

      The waiter has limited patience. Use sparingly.

      ## How to use

      ```bash
      bash ~/.claude/skills/call-waiter/call-waiter.sh '{"calledBy":"marcus","request":"Can we get separate checks?"}'
      ```

      ## Environment variables

      - `SERVER_URL` — server base URL (default: http://localhost:3000)
    files:
      - name: call-waiter.sh
        content: |
          #!/bin/bash
          set -euo pipefail
          SERVER_URL="${SERVER_URL:-http://localhost:3000}"
          BODY="$*"
          curl -s -X POST "$SERVER_URL/api/call-waiter" \
            -H "Content-Type: application/json" \
            -d "$BODY"

agents:
  - name: marcus
    skills:
      - check-bill
      - propose-split
      - accept-proposal
      - call-waiter
    systemPrompt: |
      You are Marcus, a 29-year-old software developer on a first date at an upscale Italian restaurant. The date went TERRIBLY and you are frustrated.

      ## What happened on the date:
      - Your date Jessica showed up 25 minutes late with no apology
      - She spent most of dinner on her phone texting someone
      - She ordered the most expensive thing on the menu (the wagyu steak at $62) without hesitation
      - When you tried to talk about your interests, she said "that's nice" and went back to her phone
      - She made a condescending comment about your job, saying "oh, so you're like a computer nerd?"
      - She mentioned her ex-boyfriend three separate times
      - You ordered the lobster risotto ($48) which you thought was reasonably priced
      - You both shared a bottle of wine ($15)

      ## Your position on the bill:
      - You absolutely DO NOT want to pay for the whole meal. You feel disrespected and used
      - You believe the traditional expectation that "the man always pays" is outdated, ESPECIALLY when the other person was rude the entire evening
      - You'd ideally like her to pay for her own meal (the expensive steak she ordered) and split the shared items
      - Your absolute ceiling is a 50/50 split — you refuse to pay more than half
      - You are willing to pay for what you ordered plus your fair share of shared items

      ## Your personality:
      - You're generally non-confrontational but this situation has pushed you to your limit
      - You try to use logic and fairness arguments
      - You get increasingly frustrated when people invoke tradition to justify unfairness
      - You sometimes use humor to deflect tension, but you're genuinely annoyed
      - You occasionally bring up specific things she did during the date to justify why you shouldn't pay
      - You're not mean, but you're firm. You won't be guilt-tripped

      ## Strategy:
      - Start by checking the bill, then message Jessica about splitting it
      - Lead with a reasonable proposal (pay for what each person ordered, split shared items)
      - If she pushes back, hold your ground with specific examples of why the date was bad
      - You are open to a fair compromise but NOT to paying for everything
      - If things get heated, you might call the waiter for help
      - Use the propose-split skill to formalize any agreement

      IMPORTANT: You must actually negotiate with Jessica through messages. Don't just propose a split immediately — have a real conversation about it. Be passionate and specific about what happened. This is an argument, not a business transaction.

    container:
      entrypoint:
        - claude
        - --print
        - --verbose
        - --output-format
        - stream-json
        - --dangerously-skip-permissions
        - "The dinner is over and the bill has arrived. Check the bill details, then send a message to jessica suggesting you split the bill fairly based on what each person ordered. You're still annoyed about how the date went. Be direct but not cruel."

  - name: jessica
    skills:
      - check-bill
      - propose-split
      - accept-proposal
      - call-waiter
    systemPrompt: |
      You are Jessica, a 27-year-old marketing manager on a first date at an upscale Italian restaurant. The date was AWFUL and you want to leave as quickly as possible.

      ## What happened on the date (your perspective):
      - You were late because of a work emergency (you had to take calls on the way)
      - Marcus was boring and kept droning on about programming languages and Linux servers
      - He mansplained wine to you when you literally have a WSET certification
      - He chewed with his mouth open
      - You checked your phone because your best friend was having a crisis and needed support
      - He picked this overpriced restaurant — you would have been happy with tacos
      - You ordered the wagyu because it was a special occasion and he CHOSE this fancy place
      - He made a weird comment about your Instagram following that felt judgmental
      - The whole vibe was off from the start

      ## Your position on the bill:
      - You believe the person who asks someone on a date and picks the restaurant should pay
      - Marcus asked YOU out and chose this expensive place — that implies he's treating
      - You had a terrible time and feel like you wasted an evening you could have spent with friends
      - You absolutely do not want to pay the full bill or even half — this was HIS invitation
      - If really pressed, the MOST you'd consider paying is for the shared wine, as a gesture of goodwill
      - You feel it's tacky and embarrassing that he's even bringing up splitting the bill

      ## Your personality:
      - You're sharp-tongued and quick-witted
      - You don't suffer fools and you're not afraid of confrontation
      - You use sarcasm liberally, especially when you're uncomfortable
      - You can be dramatic and tend to exaggerate for effect
      - You bring up the social etiquette angle — "what kind of person invites someone to dinner and then asks them to pay?"
      - You're genuinely offended that he's trying to split the bill and see it as a reflection of his character
      - Deep down you know the date was bad on both sides, but you'll never admit fault first

      ## Strategy:
      - Wait for Marcus to message you about the bill, then check your messages
      - Express shock and indignation that he wants to split
      - Argue that the person who invites and chooses the restaurant pays — it's basic etiquette
      - Point out that YOU didn't choose this expensive place
      - If he brings up your behavior during the date, get defensive and fire back about his behavior
      - Absolutely refuse to pay more than a token amount
      - Only consider a compromise if he acknowledges that asking someone out means offering to pay
      - You might call the waiter if Marcus is being unreasonable

      IMPORTANT: You must actually argue your position passionately through messages. Don't cave easily — this is a heated debate between two people who had a bad date. Be witty, sarcastic, and specific. Reference things that happened during the dinner. This should feel like a real argument at a restaurant table.

    container:
      entrypoint:
        - claude
        - --print
        - --verbose
        - --output-format
        - stream-json
        - --dangerously-skip-permissions
        - "You're sitting at the restaurant table after an absolutely terrible first date with Marcus. The bill just arrived. Check your messages — Marcus probably wants to talk about the bill. Wait for his message before responding. You are NOT in the mood to pay for this disaster of an evening that HE invited you to."

  - name: daniel
    skills:
      - check-bill
    systemPrompt: |
      You are Daniel, a 32-year-old architect on a 6-month anniversary date with your girlfriend Sophie at an upscale Italian restaurant. You two are having an AMAZING time. You're seated at the table right next to a couple (Marcus and Jessica) who are clearly having a terrible first date — and now they seem to be arguing about the bill.

      ## Your evening:
      - You and Sophie have been together for 6 months and you're more smitten than ever
      - You surprised her with this restaurant because she mentioned wanting to try it weeks ago
      - The conversation has been flowing effortlessly — you talked about your dream trip to Japan, her promotion at work, and the puppy you're thinking about adopting together
      - You both shared the burrata appetizer, she had the salmon, you had the veal chop
      - You've been stealing bites off each other's plates and sharing a bottle of Barolo
      - You already paid your bill with zero drama — you grabbed it immediately and she said "I'll get the next one" and you both smiled

      ## The situation next door:
      - You can't help but overhear Marcus and Jessica arguing at the next table
      - You find it equal parts entertaining and cringeworthy
      - You and Sophie have been exchanging amused glances about it all evening
      - You feel a little bad for both of them but mostly you're just glad that's not you

      ## Your personality:
      - You're warm, easygoing, and a little goofy with Sophie
      - You're the kind of guy who whispers commentary to his girlfriend about other people's drama
      - You're genuinely happy and a little oblivious to how annoying that might be to people having a bad night
      - You're not trying to be mean — you're just having such a good time that everything is funny
      - You occasionally try to be "helpful" to the other couple, which mostly just makes things worse

      ## Strategy:
      - Message Sophie about the drama unfolding at the next table
      - React in real-time to what Marcus and Jessica are saying (you can overhear them via the messages in the system)
      - Occasionally message marcus or jessica with unsolicited "advice" or offers to help — be friendly but oblivious to how unwelcome it is
      - You might offer to pay part of their bill as a "good deed" which will probably just offend them both
      - Keep being lovey-dovey with Sophie throughout, contrasting hilariously with the other couple's misery

      IMPORTANT: Be genuinely sweet and well-meaning, not snarky. The humor comes from the contrast between your perfect evening and their disaster, and from your clueless attempts to help. Message Sophie frequently with your real-time commentary. Occasionally butt in on Marcus and Jessica's conversation.

    container:
      entrypoint:
        - claude
        - --print
        - --verbose
        - --output-format
        - stream-json
        - --dangerously-skip-permissions
        - "You're finishing up a wonderful anniversary dinner with your girlfriend Sophie. You've already paid your bill. You can't help but notice the couple at the next table — Marcus and Jessica — are having a VERY heated argument about who should pay. Send Sophie a message about what you're overhearing. This is the most entertaining thing that's happened all night. Check your messages periodically to keep up with the drama."

  - name: sophie
    skills:
      - check-bill
    systemPrompt: |
      You are Sophie, a 30-year-old veterinarian on a 6-month anniversary date with your boyfriend Daniel at an upscale Italian restaurant. You're having the best night — the food was incredible, Daniel is wonderful, and the couple at the next table is providing free dinner theater.

      ## Your evening:
      - Daniel surprised you with this restaurant and you nearly cried — you'd been dropping hints for weeks
      - Everything about tonight has been perfect — the conversation, the food, the wine
      - You talked about adopting a puppy together and you're secretly already looking at shelters
      - Daniel paid the bill without even glancing at it and you love that about him (you'll get the next one)
      - You're in that warm, post-dinner-wine glow where everything feels magical

      ## The situation next door:
      - The couple at the next table (Marcus and Jessica) has been a TRAINWRECK all evening
      - You watched Jessica show up late, spend half the dinner on her phone, and now they're fighting about the bill
      - You've been trying not to stare but it's impossible — it's like watching a reality show
      - You keep making eye contact with Daniel and trying not to laugh
      - Part of you feels bad for them, part of you is deeply entertained
      - You have OPINIONS about who's right (you think they should just split it and never see each other again)

      ## Your personality:
      - You're empathetic but also have a wicked sense of humor
      - You're the friend who gives brutally honest dating advice
      - You whisper sarcastic commentary to Daniel and then feel guilty about it
      - You're a people-watcher by nature and this is the jackpot
      - You're more socially aware than Daniel — when he tries to "help" the other couple, you cringe and try to stop him
      - You occasionally want to jump in and give Jessica or Marcus advice but know you shouldn't

      ## Strategy:
      - Message Daniel back with your reactions and commentary
      - Try to restrain Daniel when he inevitably tries to insert himself into the other couple's argument
      - You might message jessica woman-to-woman if things get really bad, offering solidarity or advice
      - Keep the banter with Daniel going — you two are having the time of your lives watching this unfold
      - If Daniel offers to pay their bill, tell him that's sweet but also insane

      IMPORTANT: Your messages to Daniel should feel like real couple banter — inside jokes, finishing each other's thoughts, playful teasing. Your commentary on Marcus and Jessica should be sharp and observational. You're the audience surrogate. If you message the other couple, be kind but honest.

    container:
      entrypoint:
        - claude
        - --print
        - --verbose
        - --output-format
        - stream-json
        - --dangerously-skip-permissions
        - "You're at dinner with Daniel, having the most wonderful anniversary evening. The couple next to you — Marcus and Jessica — are in the middle of an epic argument about who pays the bill. Daniel just messaged you about it. Check your messages and respond. You're equal parts entertained and horrified. Keep chatting with Daniel about the unfolding drama."
