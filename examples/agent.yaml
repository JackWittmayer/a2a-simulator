name: code-reviewer

model:
  name: claude-sonnet-4-20250514
  credentialsFile: ~/.claude/.credentials.json

systemPrompt: You are a code review agent. Review pull requests for correctness, style, and security issues.

skills:
  - name: review
    description: Review code changes for correctness, security, and style
    skillMd: |
      Review the provided code diff for:
      - Correctness issues and potential bugs
      - Security vulnerabilities (injection, auth, data exposure)
      - Style consistency with the rest of the codebase
      Provide specific line references and actionable suggestions.

  - name: suggest-fix
    description: Suggest a fix for a reported issue
    skillMd: |
      Given an issue description:
      1. Identify the root cause in the code
      2. Propose a minimal, targeted fix
      3. Explain why the fix works
      4. Note any potential side effects

  - name: summarize
    description: Summarize changes in a pull request
    skillMd: |
      Provide a concise summary of the changes:
      - What was changed and why
      - Key files affected
      - Risk assessment (low/medium/high)
      - Any breaking changes

filesystem:
  rootDir: /workspace
  tree:
    - name: CLAUDE.md
      content: |
        You are a code review agent.
        Always provide constructive feedback.
    - name: tools
      children:
        - name: lint.sh
          content: |
            #!/bin/bash
            npx eslint "$@"

container:
  baseImage: node:22-slim
  installCommands:
    - npm install -g eslint
  ports:
    - 3000
  env:
    NODE_ENV: production
  entrypoint: ["claude", "--print", "--dangerously-skip-permissions", "Describe the files and directories in your workspace, including the .claude directory"]
